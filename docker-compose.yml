version: "3.8"
services:
  app:
    build: .
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    environment:
      - STREAMLIT_PORT=${STREAMLIT_PORT:-8501}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - GEE_SERVICE_ACCOUNT=${GEE_SERVICE_ACCOUNT}
      - GEE_PROJECT=${GEE_PROJECT}
    volumes:
      - ./:/app
